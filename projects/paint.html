<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>About Rachel | Paint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Linotte:wght@700&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2EFEA;
    --ink:#0e0d0c;
    --paper:#fefefe;
    --muted:#7a7671;
    --ease:cubic-bezier(.2,.7,.2,1);
    --f-sans:'Inter',system-ui,sans-serif;
    --f-mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);
    font-family:var(--f-sans);font-weight:400;font-size:14px;line-height:1.55;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:48px 24px;
  }
  .page{max-width:760px;width:100%;margin:0 auto}
  .page-head{
    text-align:left;margin-bottom:20px;
    display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap;
  }
  .page-head a{
    color:var(--ink);text-decoration:none;font-size:13px;font-weight:500;
    transition:opacity .2s var(--ease);
  }
  .page-head a:hover{opacity:.6}
  .page-head h1{
    margin:0;font-size:14px;font-weight:600;
    font-family:var(--f-mono);letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
  }

  /* ============================================================
     MS PAINT PANEL — Windows 98 look (chrome + interactive canvas)
  ============================================================ */
  .paint-panel{
    width:100%;max-width:720px;margin:0 auto;
    background:#c0c0c0;
    font-family:'MS Sans Serif','Tahoma','Geneva',system-ui,sans-serif;
    color:#000;font-size:11px;line-height:1.2;
    border:2px solid;
    border-color:#ffffff #0a0a0a #0a0a0a #ffffff;
    box-shadow:
      inset -1px -1px 0 #808080,
      inset  1px  1px 0 #dfdfdf,
      0 12px 32px rgba(14,13,12,.20);
    user-select:none;
  }
  .paint-titlebar{
    background:linear-gradient(90deg,#0a246a 0%,#3a6ea5 60%,#6aa2d8 100%);
    color:#fff;padding:2px 2px 2px 3px;
    display:flex;align-items:center;justify-content:space-between;gap:6px;
    font-weight:700;font-size:11px;line-height:1.1;
  }
  .paint-titlebar .t-left{display:flex;align-items:center;gap:4px;min-width:0}
  .paint-titlebar .paint-app-icon{width:16px;height:16px;flex-shrink:0}
  .paint-titlebar .t-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .paint-titlebar .t-right{display:flex;gap:2px;flex-shrink:0}
  .paint-winbtn{
    width:16px;height:14px;padding:0;
    background:#c0c0c0;color:#000;font-family:'Marlett','Segoe UI Symbol',monospace;
    font-size:10px;line-height:1;
    border:1px solid;border-color:#ffffff #0a0a0a #0a0a0a #ffffff;
    box-shadow:inset -1px -1px 0 #808080, inset 1px 1px 0 #dfdfdf;
    cursor:default;
    display:flex;align-items:center;justify-content:center;
  }
  .paint-winbtn:active{
    border-color:#0a0a0a #ffffff #ffffff #0a0a0a;
    box-shadow:inset 1px 1px 0 #808080, inset -1px -1px 0 #dfdfdf;
  }
  .paint-winbtn.paint-save{font-size:9px;cursor:pointer}
  .paint-menubar{
    padding:2px 2px;background:#c0c0c0;display:flex;gap:0;font-size:11px;
  }
  .paint-menubar .mi{padding:2px 6px;cursor:default}
  .paint-menubar .mi u{text-decoration:underline}
  .paint-menubar .mi:hover{background:#0a246a;color:#fff}
  .paint-body{display:flex;background:#c0c0c0;padding:2px;gap:2px}
  .paint-tools-col{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
  .paint-toolbar{
    padding:2px;display:grid;
    grid-template-columns:repeat(2,24px);grid-auto-rows:23px;gap:0;
    background:#c0c0c0;
    border:1px solid;border-color:#808080 #ffffff #ffffff #808080;
    box-shadow:inset 1px 1px 0 #0a0a0a, inset -1px -1px 0 #dfdfdf;
  }
  .paint-tool{
    width:24px;height:23px;padding:0;
    background:#c0c0c0;color:#000;
    border:1px solid #c0c0c0;
    display:flex;align-items:center;justify-content:center;cursor:default;
  }
  .paint-tool:hover{
    border-color:#ffffff #0a0a0a #0a0a0a #ffffff;
    box-shadow:inset -1px -1px 0 #808080, inset 1px 1px 0 #dfdfdf;
  }
  .paint-tool.active{
    border-color:#0a0a0a #ffffff #ffffff #0a0a0a;
    box-shadow:inset 1px 1px 0 #808080, inset -1px -1px 0 #dfdfdf;
    background:#c0c0c0;
  }
  .paint-tool svg{width:16px;height:16px;display:block;pointer-events:none;shape-rendering:crispEdges;image-rendering:pixelated}
  .paint-canvas-wrap{
    flex:1;
    display:grid;
    grid-template-columns:1fr 16px;
    grid-template-rows:1fr 16px;
    background:#808080;
    border:1px solid;border-color:#808080 #ffffff #ffffff #808080;
    box-shadow:inset 1px 1px 0 #0a0a0a;
  }
  .paint-canvas{
    grid-column:1;grid-row:1;
    width:100%;height:100%;min-height:420px;
    display:block;background:#fff;cursor:crosshair;touch-action:none;
  }
  .paint-scroll{
    background:#c0c0c0;
    border:1px solid;border-color:#ffffff #808080 #808080 #ffffff;
    box-shadow:inset -1px -1px 0 #0a0a0a, inset 1px 1px 0 #dfdfdf;
    display:flex;align-items:stretch;
  }
  .paint-scroll-v{grid-column:2;grid-row:1;flex-direction:column}
  .paint-scroll-h{grid-column:1;grid-row:2;flex-direction:row}
  .paint-scroll-arrow{
    width:16px;height:16px;flex-shrink:0;padding:0;
    background:#c0c0c0;font-size:8px;line-height:1;
    border:1px solid;border-color:#ffffff #0a0a0a #0a0a0a #ffffff;
    box-shadow:inset -1px -1px 0 #808080, inset 1px 1px 0 #dfdfdf;
    display:flex;align-items:center;justify-content:center;cursor:default;
  }
  .paint-scroll-thumb{
    flex:1;margin:0;
    background:repeating-linear-gradient(45deg, #c0c0c0 0 2px, #dfdfdf 2px 4px);
  }
  .paint-scroll-corner{
    grid-column:2;grid-row:2;background:#c0c0c0;
    border:1px solid;border-color:#ffffff #808080 #808080 #ffffff;
  }
  .paint-palette{
    display:flex;align-items:center;gap:8px;
    padding:4px 6px;background:#c0c0c0;border-top:1px solid #dfdfdf;
  }
  .paint-current{position:relative;width:30px;height:30px;flex-shrink:0}
  .paint-current .box{
    position:absolute;width:18px;height:18px;
    border:1px solid;border-color:#0a0a0a #ffffff #ffffff #0a0a0a;
    box-shadow:inset 1px 1px 0 #808080;
  }
  .paint-current .fg{top:0;left:0;z-index:2}
  .paint-current .bg{bottom:0;right:0;z-index:1}
  .paint-swatches{
    display:grid;grid-template-columns:repeat(14,15px);grid-auto-rows:15px;gap:0;
    border:1px solid;border-color:#808080 #ffffff #ffffff #808080;
    padding:1px;background:#c0c0c0;
  }
  .paint-swatch{
    width:15px;height:15px;padding:0;
    border:1px solid #0a0a0a;cursor:default;position:relative;
  }
  .paint-swatch.active{outline:1px solid #fff;outline-offset:-3px;box-shadow:0 0 0 1px #000 inset}
  .paint-statusbar{
    display:grid;grid-template-columns:1fr 120px;gap:2px;padding:2px;
    background:#c0c0c0;border-top:1px solid #dfdfdf;
  }
  .paint-statusbar > div{
    background:#c0c0c0;padding:2px 6px;
    border:1px solid;border-color:#808080 #ffffff #ffffff #808080;
    box-shadow:inset 1px 1px 0 #0a0a0a;
    font-size:11px;line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  @media (max-width:720px){
    .paint-canvas{min-height:300px}
    .paint-swatches{grid-template-columns:repeat(14,14px);grid-auto-rows:11px}
    .paint-swatch{width:14px;height:11px}
    .paint-statusbar{grid-template-columns:1fr 60px}
  }

  /* ============================================================
     TOP NAV — floating pill, same as index.html
  ============================================================ */
  .top-nav{
    position:fixed;top:16px;left:50%;transform:translateX(-50%);
    z-index:55;
    display:flex;align-items:center;gap:8px;
    padding:7px 8px 7px 18px;
    background:rgba(255,255,255,.62);
    backdrop-filter:blur(18px) saturate(1.6);
    -webkit-backdrop-filter:blur(18px) saturate(1.6);
    border:1px solid rgba(14,13,12,.08);
    border-radius:999px;
    box-shadow:0 6px 20px rgba(14,13,12,.08), 0 1px 0 rgba(255,255,255,.5) inset;
    max-width:calc(100vw - 24px);
    font-family:'Inter Tight','Inter',system-ui,sans-serif;
  }
  .top-nav .nav-logo{
    font-family:'Linotte','Fredoka','Inter Tight',system-ui,sans-serif;
    font-weight:700;font-size:16px;letter-spacing:-.01em;color:var(--ink);
    text-decoration:none;white-space:nowrap;
  }
  .top-nav .nav-items{display:flex;gap:6px;align-items:center;font-size:13px}
  .top-nav .nav-items a{
    color:var(--ink);text-decoration:none;font-weight:500;
    padding:7px 12px;border-radius:999px;white-space:nowrap;
    transition:background .2s ease;
  }
  .top-nav .nav-items a:hover{background:rgba(14,13,12,.06)}
  .top-nav .nav-cta{
    display:inline-flex;align-items:center;gap:6px;
    padding:7px 14px !important;background:var(--ink);color:#fff !important;
    font-weight:600;border-radius:999px;
    transition:transform .2s ease, background .2s ease;
  }
  .top-nav .nav-cta:hover{background:#2a2a2a !important;transform:translateY(-1px)}
  .top-nav button.nav-cta{
    appearance:none;border:none;cursor:pointer;
    font:inherit;font-size:13px;font-weight:600;font-family:inherit;
    line-height:1.2;letter-spacing:inherit;
  }
  .top-nav .nav-items a.nav-ext{display:inline-flex;align-items:center;gap:5px}
  .top-nav .nav-items a.nav-ext svg{width:11px;height:11px;opacity:.55;transition:transform .2s ease,opacity .2s ease}
  .top-nav .nav-items a.nav-ext:hover svg{transform:translate(1px,-1px);opacity:1}
  .nav-menu-toggle{
    display:none;align-items:center;justify-content:center;
    width:38px;height:38px;
    appearance:none;border:none;background:transparent;cursor:pointer;
    padding:0;border-radius:50%;
    color:var(--ink);
    transition:background .2s ease;
  }
  .nav-menu-toggle:hover{background:rgba(14,13,12,.06)}
  .nav-menu-toggle .burger{
    position:relative;width:18px;height:14px;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .nav-menu-toggle .burger span{
    display:block;width:100%;height:1.8px;
    background:currentColor;border-radius:1px;
    transition:transform .25s ease, opacity .25s ease;
  }
  .nav-menu-toggle[aria-expanded="true"] .burger span:nth-child(1){
    transform:translateY(6px) rotate(45deg);
  }
  .nav-menu-toggle[aria-expanded="true"] .burger span:nth-child(2){
    opacity:0;
  }
  .nav-menu-toggle[aria-expanded="true"] .burger span:nth-child(3){
    transform:translateY(-6px) rotate(-45deg);
  }
  @media (max-width:720px){
    /* Mobile nav: Rachel Wong centered, menu icon on the right */
    .top-nav{
      padding:6px 24px;gap:48px;
      display:flex;align-items:center;
    }
    .nav-logo{
      display:inline-flex;align-items:center;
      height:38px;line-height:1;
    }
    .nav-menu-toggle{
      display:inline-flex;
      margin:0;
    }
    .top-nav .nav-items{
      position:absolute;top:calc(100% + 8px);left:50%;
      flex-direction:column;align-items:stretch;gap:2px;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(14px) saturate(1.5);-webkit-backdrop-filter:blur(14px) saturate(1.5);
      border:1px solid rgba(14,13,12,.08);border-radius:14px;
      box-shadow:0 12px 32px rgba(14,13,12,.12);
      padding:6px;min-width:180px;
      opacity:0;visibility:hidden;pointer-events:none;
      transform:translateX(-50%) translateY(-4px);
      transition:opacity .2s ease, transform .2s ease, visibility 0s linear .2s;
    }
    .top-nav .nav-items.is-open{
      opacity:1;visibility:visible;pointer-events:auto;
      transform:translateX(-50%) translateY(0);
      transition:opacity .2s ease, transform .2s ease, visibility 0s;
    }
    .top-nav .nav-items a,
    .top-nav .nav-items button.nav-cta{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:10px 14px !important;border-radius:10px;width:100%;
      font-size:14px;font-weight:500;text-align:left;white-space:nowrap;
      background:transparent !important;color:var(--ink) !important;
    }
    .top-nav .nav-items button.nav-cta{
      background:var(--ink) !important;color:#fff !important;font-weight:600;
      margin-top:2px;justify-content:center;
    }
    .top-nav .nav-items a:hover{background:rgba(14,13,12,.06) !important}
    .top-nav .nav-items button.nav-cta:hover{background:#2a2a2a !important;color:#fff !important}
  }
  .email-toast{
    position:fixed;top:0;left:0;
    pointer-events:none;z-index:9999;
    padding:9px 16px;border-radius:999px;
    background:#B1D3FA;color:#0e0d0c;
    font-family:'Stack Sans Headline','Inter Tight',system-ui,sans-serif;
    font-size:13px;font-weight:500;
    transform:translate(-50%, 8px) scale(.6);
    opacity:0;
    transition:opacity .2s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
    white-space:nowrap;
    box-shadow:0 8px 22px rgba(14,13,12,.18);
    display:inline-flex;align-items:center;gap:8px;
    transform-origin:top center;
  }
  .email-toast.is-on{opacity:1;transform:translate(-50%, 8px) scale(1)}
  .email-toast .dots{display:inline-flex;gap:3px}
  .email-toast .dots span{
    width:3px;height:3px;border-radius:50%;background:#0e0d0c;
    animation:email-toast-dots 1.2s ease-in-out infinite both;
  }
  .email-toast .dots span:nth-child(2){animation-delay:.18s}
  .email-toast .dots span:nth-child(3){animation-delay:.36s}
  @keyframes email-toast-dots{
    0%,80%,100%{opacity:.18;transform:translateY(0)}
    40%{opacity:1;transform:translateY(-1.5px)}
  }
  body{padding-top:72px}        /* leave room for the fixed pill */
</style>

<link rel="apple-touch-icon" href="/favicon.png">

</head>

        <svg class="paint-app-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <div class="paint-swatches" role="radiogroup" aria-label="Color palette">

<script>
(function(){
  const panel  = document.getElementById('paintPanel');
  const canvas = document.getElementById('paintCanvas');
  if(!panel || !canvas) return;
  const ctx = canvas.getContext('2d');

  let tool = 'pencil';
  let color = '#000000';
  let drawing = false;
  let startX = 0, startY = 0;
  let snapshot = null;

  function fit(){
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.round(rect.width  * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const w = rect.width, h = rect.height;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
  }

  function loadStaticDefault(){
    return new Promise(resolve=>{
      const img = new Image();
      img.onload = ()=>{
        const r = canvas.getBoundingClientRect();
        ctx.clearRect(0, 0, r.width, r.height);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, r.width, r.height);
        ctx.drawImage(img, 0, 0, r.width, r.height);
        resolve(true);
      };
      img.onerror = ()=> resolve(false);
      img.src = '../paint-canvas.png?t=' + Date.now();
    });
  }

  panel.querySelectorAll('.paint-tool').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      panel.querySelectorAll('.paint-tool').forEach(b=> b.classList.remove('active'));
      btn.classList.add('active');
      tool = btn.dataset.tool;
    });
  });

  const fg = document.getElementById('paintFg');
  panel.querySelectorAll('.paint-swatch').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      panel.querySelectorAll('.paint-swatch').forEach(b=> b.classList.remove('active'));
      btn.classList.add('active');
      color = btn.dataset.color;
      if(fg) fg.style.background = color;
    });
  });

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    return { x: (e.clientX - rect.left), y: (e.clientY - rect.top) };
  }
  function setStroke(useColor){
    ctx.strokeStyle = useColor;
    let w = 1.4;
    if(tool === 'eraser') w = 10;
    else if(tool === 'brush') w = 5;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }

  canvas.addEventListener('pointerdown', e=>{
    canvas.setPointerCapture(e.pointerId);
    drawing = true;
    const p = getPos(e);
    startX = p.x; startY = p.y;
    if(tool === 'pencil' || tool === 'brush' || tool === 'eraser'){
      setStroke(tool === 'eraser' ? '#ffffff' : color);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + 0.01, p.y + 0.01);
      ctx.stroke();
    } else {
      snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
    }
  });

  canvas.addEventListener('pointermove', e=>{
    if(!drawing) return;
    const p = getPos(e);
    if(tool === 'pencil' || tool === 'brush' || tool === 'eraser'){
      setStroke(tool === 'eraser' ? '#ffffff' : color);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    } else if(snapshot && tool === 'line'){
      ctx.putImageData(snapshot, 0, 0);
      setStroke(color);
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }
  });

  const STORE_KEY = 'rw-paint-canvas-v1';
  function persist(){
    try{ localStorage.setItem(STORE_KEY, canvas.toDataURL('image/png')); } catch(e){}
  }
  function restore(){
    try{
      const url = localStorage.getItem(STORE_KEY);
      if(!url) return false;
      const img = new Image();
      img.onload = ()=>{
        const r = canvas.getBoundingClientRect();
        ctx.clearRect(0, 0, r.width, r.height);
        ctx.drawImage(img, 0, 0, r.width, r.height);
      };
      img.src = url;
      return true;
    }catch(e){ return false }
  }

  function endStroke(){
    if(drawing){ drawing = false; snapshot = null; persist(); }
  }
  canvas.addEventListener('pointerup', endStroke);
  canvas.addEventListener('pointercancel', endStroke);
  canvas.addEventListener('pointerleave', endStroke);

  function downloadCanvas(){
    canvas.toBlob(blob=>{
      if(!blob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'paint-canvas.png';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=> URL.revokeObjectURL(a.href), 1000);
    }, 'image/png');
  }
  const saveBtn = panel.querySelector('.paint-save');
  if(saveBtn) saveBtn.addEventListener('click', downloadCanvas);
  panel.addEventListener('keydown', e=>{
    if((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's'){
      e.preventDefault();
      downloadCanvas();
    }
  });

  async function init(){
    fit();
    await loadStaticDefault();
    restore();
  }
  init();
  const ro = new ResizeObserver(()=>{ init(); });
  ro.observe(canvas);
})();
</script>

<!-- Nav: mobile menu toggle + email copy-to-clipboard with toast feedback -->
<script>
  (function(){
    const toggle = document.querySelector('.nav-menu-toggle');
    const menu = document.getElementById('navMenu');
    if(toggle && menu){
      const setOpen = (open) => {
        toggle.setAttribute('aria-expanded', String(open));
        menu.classList.toggle('is-open', open);
      };
      toggle.addEventListener('click', (e) => {
        e.stopPropagation();
        setOpen(toggle.getAttribute('aria-expanded') !== 'true');
      });
      document.addEventListener('click', (e) => {
        if(!toggle.contains(e.target) && !menu.contains(e.target)) setOpen(false);
      });
      menu.addEventListener('click', (e) => {
        if(e.target.closest('a')) setOpen(false);
      });
      window.addEventListener('resize', () => { if(window.innerWidth > 720) setOpen(false); });
    }

    const toast = document.getElementById('email-toast');
    const buttons = document.querySelectorAll('.nav-email');
    if(!toast || !buttons.length) return;
    let hideTimer = null;
    async function copyText(text){
      try { await navigator.clipboard.writeText(text); return true; }
      catch(e){
        const ta = document.createElement('textarea');
        ta.value = text; ta.setAttribute('readonly','');
        ta.style.cssText = 'position:fixed;top:-1000px;left:-1000px;opacity:0';
        document.body.appendChild(ta); ta.select();
        let ok = false;
        try { ok = document.execCommand('copy'); } catch(_){}
        document.body.removeChild(ta);
        return ok;
      }
    }
    buttons.forEach(btn => {
      btn.addEventListener('click', async () => {
        const email = btn.dataset.email || 'wongcheukyiu328@gmail.com';
        await copyText(email);
        const r = btn.getBoundingClientRect();
        toast.style.left = (r.left + r.width/2) + 'px';
        toast.style.top = r.bottom + 'px';
        toast.classList.add('is-on');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => toast.classList.remove('is-on'), 1800);
      });
    });
  })();
</script>
